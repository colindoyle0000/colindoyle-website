<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Monster</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="gameCanvas" width="256" height="240"></canvas>
  <div id="hint">Click canvas or press keys to play</div>

  <div id="wordEditor">
    <div id="wordEditorPanel">
      <h2>WORD LIST</h2>
      <p>Edit, add, or remove spelling words</p>
      <div id="wordRows"></div>
      <div id="wordEditorAddRow">
        <input id="wordEditorNewInput" type="text" placeholder="add a word..." maxlength="20" />
        <button id="wordEditorAddBtn">+ ADD</button>
      </div>
      <div id="wordEditorButtons">
        <button id="wordEditorSave">SAVE &amp; CLOSE</button>
        <button id="wordEditorCancel">CANCEL</button>
      </div>
    </div>
  </div>

  <script src="js/words.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/sfx.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
